<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Furkan Cetin — foorgun.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .page {
      max-width: 640px;
      width: 100%;
      padding: 3rem 0 4rem;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1rem;
    }

    .link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .link-card {
      background: #0b0b0b;
      border: 0.5px solid #1a1a1a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }

    .link-card:hover { border-color: #333; }

    .link-card.mail-card { border-color: #252525; }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #111;
      border: 0.5px solid #1e1e1e;
    }

    .link-icon img { width: 18px; height: 18px; }

    .link-text .name {
      font-size: 13px;
      font-weight: 500;
      color: #d0d0d0;
    }

    .link-text .desc {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .toast {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      background: #1c1c1c;
      border: 0.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: #ccc;
      white-space: nowrap;
      display: none;
      z-index: 10;
    }

    .toast.show { display: block; }

    @media (max-width: 480px) {
      .link-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">

    <p class="section-label">Links</p>

    <div class="link-grid">
      <div class="link-card mail-card" onclick="copyEmail()">
        <div class="link-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Mail_%28iOS%29.svg" alt="Email" />
        </div>
        <div class="link-text">
          <div class="name">Let's get in touch!</div>
          <div class="desc">hello@foorgun.com</div>
        </div>
        <div class="toast" id="toast">Mail copied!</div>
      </div>

      <a class="link-card" href="https://www.linkedin.com/in/furkan-cetin-660004211/" target="_blank" rel="noopener">
        <div class="link-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg" alt="LinkedIn" />
        </div>
        <div class="link-text">
          <div class="name">LinkedIn</div>
          <div class="desc">Professional updates</div>
        </div>
      </a>

      <a class="link-card" href="https://youtube.com/@foorgun" target="_blank" rel="noopener">
        <div class="link-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube" />
        </div>
        <div class="link-text">
          <div class="name">YouTube</div>
          <div class="desc">Travel · fights · engineer life</div>
        </div>
      </a>

      <a class="link-card" href="https://instagram.com/foorgun" target="_blank" rel="noopener">
        <div class="link-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_new.svg" alt="Instagram" />
        </div>
        <div class="link-text">
          <div class="name">Instagram</div>
          <div class="desc">Life · Muay Thai · no 9-5</div>
        </div>
      </a>
    </div>

  </div>

  <script>
    function copyEmail() {
      navigator.clipboard.writeText('hello@foorgun.com').then(function () {
        var toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 2500);
      });
    }
  </script>
</body>
</html>
